name: Deploy Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
  TF_IN_AUTOMATION: true
  TF_VERSION: 1.6.6
  TF_VAR_aws_region: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
  TF_VAR_domain_name: ${{ vars.TF_VAR_DOMAIN_NAME != '' && vars.TF_VAR_DOMAIN_NAME || 'code.bo' }}
  TF_VAR_hosted_zone_name: ${{ vars.TF_VAR_HOSTED_ZONE_NAME != '' && vars.TF_VAR_HOSTED_ZONE_NAME || 'code.bo' }}
  TF_VAR_bucket_name: ${{ vars.TF_VAR_BUCKET_NAME }}
  TF_VAR_acm_certificate_arn: ${{ vars.TF_VAR_ACM_CERTIFICATE_ARN }}
  TF_VAR_create_route53_alias_records: ${{ vars.TF_VAR_CREATE_ROUTE53_ALIAS_RECORDS != '' && vars.TF_VAR_CREATE_ROUTE53_ALIAS_RECORDS || 'true' }}
  TF_VAR_project_name: ${{ vars.TF_VAR_PROJECT_NAME != '' && vars.TF_VAR_PROJECT_NAME || 'codebolab-website' }}
  TF_VAR_environment: ${{ vars.TF_VAR_ENVIRONMENT != '' && vars.TF_VAR_ENVIRONMENT || 'production' }}
  TF_VAR_www_subdomain: ${{ vars.TF_VAR_WWW_SUBDOMAIN != '' && vars.TF_VAR_WWW_SUBDOMAIN || 'www' }}

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_GITHUB_DEPLOY_ROLE_ARN || secrets.AWS_GITHUB_DEPLOY_ROLE_ARN || secrets.AWS_ROLE_TO_ASSUME }}

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive

      - name: Initialize Terraform
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=${{ secrets.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.TERRAFORM_STATE_KEY != '' && vars.TERRAFORM_STATE_KEY || 'codebolab/website/terraform.tfstate' }}" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Validate Terraform configuration
        run: terraform validate

      - name: Generate Terraform plan
        if: ${{ github.event_name == 'pull_request' }}
        run: terraform plan -input=false -no-color -out=tfplan

  deploy:
    name: Apply Terraform
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_GITHUB_DEPLOY_ROLE_ARN || secrets.AWS_GITHUB_DEPLOY_ROLE_ARN || secrets.AWS_ROLE_TO_ASSUME }}

      - name: Initialize Terraform
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=${{ secrets.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.TERRAFORM_STATE_KEY != '' && vars.TERRAFORM_STATE_KEY || 'codebolab/website/terraform.tfstate' }}" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Apply Terraform changes
        run: terraform apply -input=false -auto-approve
