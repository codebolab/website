name: Terraform

on:
  pull_request:
    paths:
      - ".github/workflows/terraform.yml"
      - "terraform/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/terraform.yml"
      - "terraform/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-production
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
  TF_IN_AUTOMATION: true
  TF_VAR_aws_region: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
  TF_VAR_domain_name: ${{ vars.TF_VAR_DOMAIN_NAME != '' && vars.TF_VAR_DOMAIN_NAME || 'code.bo' }}
  TF_VAR_hosted_zone_name: ${{ vars.TF_VAR_HOSTED_ZONE_NAME != '' && vars.TF_VAR_HOSTED_ZONE_NAME || 'code.bo' }}
  TF_VAR_bucket_name: ${{ vars.TF_VAR_BUCKET_NAME }}
  TF_VAR_acm_certificate_arn: ${{ vars.TF_VAR_ACM_CERTIFICATE_ARN }}
  TF_VAR_create_route53_alias_records: ${{ vars.TF_VAR_CREATE_ROUTE53_ALIAS_RECORDS != '' && vars.TF_VAR_CREATE_ROUTE53_ALIAS_RECORDS || 'true' }}
  TF_VAR_project_name: ${{ vars.TF_VAR_PROJECT_NAME != '' && vars.TF_VAR_PROJECT_NAME || 'codebolab-website' }}
  TF_VAR_environment: ${{ vars.TF_VAR_ENVIRONMENT != '' && vars.TF_VAR_ENVIRONMENT || 'production' }}
  TF_VAR_www_subdomain: ${{ vars.TF_VAR_WWW_SUBDOMAIN != '' && vars.TF_VAR_WWW_SUBDOMAIN || 'www' }}

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=${{ secrets.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.TERRAFORM_STATE_KEY != '' && vars.TERRAFORM_STATE_KEY || 'codebolab/website/terraform.tfstate' }}" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: terraform
        run: terraform plan -input=false -no-color -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/tfplan
          if-no-files-found: error

  apply:
    name: Apply
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: plan
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=${{ secrets.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.TERRAFORM_STATE_KEY != '' && vars.TERRAFORM_STATE_KEY || 'codebolab/website/terraform.tfstate' }}" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: terraform

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -input=false tfplan
